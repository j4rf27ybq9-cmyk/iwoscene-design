<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>IWOSCENE 3.0 - 微信已绑定</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC','Alibaba PuHuiTi',-apple-system,sans-serif; background:#F0F4F8; width:1920px; height:1080px; overflow:hidden; -webkit-font-smoothing:antialiased; }
  body::before { content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%; z-index:-1; background:radial-gradient(ellipse at 20% 50%,rgba(25,134,236,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(25,134,236,.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(1,184,100,.02) 0%,transparent 50%),#F0F4F8; }
  .sidebar { position:fixed; left:0; top:0; width:260px; height:1080px; background:#fff; z-index:10; box-shadow:2px 0 20px rgba(0,0,0,.03); }
  .sidebar-logo { height:64px; display:flex; align-items:center; padding:0 24px; font-size:18px; font-weight:700; background:linear-gradient(135deg,#1986EC,#0D6BC4); color:#fff; letter-spacing:.5px; }
  .sidebar-logo svg { margin-right:12px; }
  .sidebar-menu { padding:16px 0; }
  .menu-label { padding:8px 24px; font-size:11px; color:rgba(0,0,0,.26); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
  .menu-item { height:44px; display:flex; align-items:center; padding:0 24px; margin:2px 12px; color:rgba(0,0,0,.55); font-size:14px; border-radius:10px; }
  .menu-item.active { background:linear-gradient(135deg,#1986EC,#1A7DE0); color:#fff; font-weight:500; box-shadow:0 4px 12px rgba(25,134,236,.3); }
  .menu-item svg { width:18px; height:18px; margin-right:12px; opacity:.7; }
  .menu-item.active svg { opacity:1; }
  .header { position:fixed; top:0; left:260px; right:0; height:64px; background:rgba(255,255,255,.85); backdrop-filter:blur(20px); display:flex; align-items:center; justify-content:space-between; padding:0 32px; z-index:9; border-bottom:1px solid rgba(0,0,0,.04); }
  .header-breadcrumb { font-size:13px; color:rgba(0,0,0,.38); }
  .header-breadcrumb span { color:rgba(0,0,0,.68); font-weight:500; }
  .header-right { display:flex; align-items:center; gap:20px; }
  .header-icon-btn { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:rgba(0,0,0,.38); }

  .header-user-name { font-size:13px; color:rgba(0,0,0,.68); }
  .content-area { position:fixed; left:260px; top:64px; right:0; bottom:0; padding:28px 32px; overflow:hidden; }
  .page-header { margin-bottom:28px; }
  .page-title { font-size:24px; font-weight:600; color:rgba(0,0,0,.92); margin-bottom:4px; }
  .page-subtitle { font-size:13px; color:rgba(0,0,0,.38); }
  .tab-bar { display:flex; gap:4px; margin-bottom:28px; background:#fff; padding:5px; border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.04); width:fit-content; }
  .tab-item { padding:10px 24px; border-radius:10px; font-size:13px; color:rgba(0,0,0,.44); font-weight:500; display:flex; align-items:center; gap:6px; }
  .tab-item.active { background:#fff; color:#1986EC; box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .tab-item svg { width:16px; height:16px; }
  .card { background:#fff; border-radius:16px; box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 20px rgba(0,0,0,.02); border:1px solid rgba(0,0,0,.04); overflow:hidden; }
  .card-header { padding:24px 32px 0; display:flex; align-items:center; justify-content:space-between; }
  .card-title { font-size:16px; font-weight:600; color:rgba(0,0,0,.88); display:flex; align-items:center; gap:10px; }
  .icon-circle { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .icon-circle svg { width:18px; height:18px; }
  .card-desc { padding:8px 32px 0; font-size:13px; color:rgba(0,0,0,.38); }
  .card-body { padding:24px 32px 32px; }
  .status-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; background:rgba(1,184,100,.08); color:#01B864; }
  .status-badge .dot { width:6px; height:6px; border-radius:50%; background:currentColor; animation:pulse 2s infinite; }

  .wechat-bound-area { display:flex; align-items:center; gap:32px; padding:12px 0; }
  .wechat-avatar-bound { width:72px; height:72px; border-radius:18px; background:linear-gradient(135deg,#07C160,#06AD56); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(7,193,96,.25); flex-shrink:0; }
  .wechat-avatar-bound svg { width:36px; height:36px; color:#fff; }
  .wechat-bound-info { flex:1; }
  .wechat-bound-info .name { font-size:18px; font-weight:600; color:rgba(0,0,0,.88); margin-bottom:4px; }
  .wechat-bound-info .account { font-size:13px; color:rgba(0,0,0,.38); margin-bottom:4px; }
  .wechat-bound-info .bind-time { font-size:12px; color:rgba(0,0,0,.26); }
  .security-tips { display:flex; gap:12px; padding:16px 20px; background:rgba(7,193,96,.04); border-radius:12px; border:1px solid rgba(7,193,96,.08); margin-top:20px; }
  .security-tips svg { width:18px; height:18px; color:#07C160; flex-shrink:0; }
  .security-tips p { font-size:12px; color:rgba(0,0,0,.55); line-height:18px; }
  .btn { height:36px; padding:0 20px; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
  .btn-secondary { background:rgba(0,0,0,.03); color:rgba(0,0,0,.68); border:1.5px solid rgba(0,0,0,.08); }
  .btn-danger { background:rgba(211,31,31,.06); color:#D31F1F; border:1.5px solid rgba(211,31,31,.12); }
  .form-actions { display:flex; gap:12px; margin-top:32px; padding-top:24px; border-top:1px solid rgba(0,0,0,.04); }
  .decoration-dots { position:absolute; right:40px; top:40px; width:80px; height:80px; opacity:.06; background-image:radial-gradient(circle,#1986EC 1.5px,transparent 1.5px); background-size:16px 16px; }
</style>
