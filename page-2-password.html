<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>IWOSCENE 3.0 - 修改密码</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC','Alibaba PuHuiTi',-apple-system,sans-serif; background:#F0F4F8; width:1920px; height:1080px; overflow:hidden; -webkit-font-smoothing:antialiased; }
  body::before { content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%; z-index:-1; background:radial-gradient(ellipse at 20% 50%,rgba(25,134,236,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(25,134,236,.04) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(1,184,100,.02) 0%,transparent 50%),#F0F4F8; }
  .sidebar { position:fixed; left:0; top:0; width:260px; height:1080px; background:#fff; z-index:10; box-shadow:2px 0 20px rgba(0,0,0,.03); }
  .sidebar-logo { height:64px; display:flex; align-items:center; padding:0 24px; font-size:18px; font-weight:700; background:linear-gradient(135deg,#1986EC,#0D6BC4); color:#fff; letter-spacing:.5px; }
  .sidebar-logo svg { margin-right:12px; }
  .sidebar-menu { padding:16px 0; }
  .menu-label { padding:8px 24px; font-size:11px; color:rgba(0,0,0,.26); text-transform:uppercase; letter-spacing:1px; font-weight:600; }
  .menu-item { height:44px; display:flex; align-items:center; padding:0 24px; margin:2px 12px; color:rgba(0,0,0,.55); font-size:14px; border-radius:10px; }
  .menu-item.active { background:linear-gradient(135deg,#1986EC,#1A7DE0); color:#fff; font-weight:500; box-shadow:0 4px 12px rgba(25,134,236,.3); }
  .menu-item svg { width:18px; height:18px; margin-right:12px; opacity:.7; }
  .menu-item.active svg { opacity:1; }
  .header { position:fixed; top:0; left:260px; right:0; height:64px; background:rgba(255,255,255,.85); backdrop-filter:blur(20px); display:flex; align-items:center; justify-content:space-between; padding:0 32px; z-index:9; border-bottom:1px solid rgba(0,0,0,.04); }
  .header-breadcrumb { font-size:13px; color:rgba(0,0,0,.38); }
  .header-breadcrumb span { color:rgba(0,0,0,.68); font-weight:500; }
  .header-right { display:flex; align-items:center; gap:20px; }
  .header-icon-btn { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:rgba(0,0,0,.38); }
  .header-avatar-wrap { display:flex; align-items:center; gap:10px; padding:4px 12px 4px 4px; border-radius:28px; }
  .header-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#1986EC,#01B864); display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600; }
  .header-user-name { font-size:13px; color:rgba(0,0,0,.68); }
  .content-area { position:fixed; left:260px; top:64px; right:0; bottom:0; padding:28px 32px; overflow:hidden; display:flex; flex-direction:column; }
  .page-header { margin-bottom:20px; }
  .page-title { font-size:24px; font-weight:600; color:rgba(0,0,0,.92); margin-bottom:4px; }
  .page-subtitle { font-size:13px; color:rgba(0,0,0,.38); }
  .tab-bar { display:flex; gap:4px; margin-bottom:24px; background:#fff; padding:5px; border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.04); width:fit-content; }
  .tab-item { padding:10px 24px; border-radius:10px; font-size:13px; color:rgba(0,0,0,.44); font-weight:500; display:flex; align-items:center; gap:6px; }
  .tab-item.active { background:#fff; color:#1986EC; box-shadow:0 2px 8px rgba(0,0,0,.08); }
  .tab-item svg { width:16px; height:16px; }
  .main-grid { display:grid; grid-template-columns:1fr 400px; gap:24px; flex:1; min-height:0; }
  .card { background:#fff; border-radius:16px; box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 20px rgba(0,0,0,.02); border:1px solid rgba(0,0,0,.04); overflow:hidden; }
  .card-header { padding:24px 28px 0; display:flex; align-items:center; justify-content:space-between; }
  .card-title { font-size:16px; font-weight:600; color:rgba(0,0,0,.88); display:flex; align-items:center; gap:10px; }
  .icon-circle { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .icon-circle svg { width:18px; height:18px; }
  .card-desc { padding:8px 28px 0; font-size:13px; color:rgba(0,0,0,.38); }
  .card-body { padding:24px 28px 28px; }
  .form-grid { display:grid; gap:20px; }
  .form-group { display:flex; flex-direction:column; gap:8px; }
  .form-label { font-size:13px; font-weight:500; color:rgba(0,0,0,.68); }
  .form-label .required { color:#D31F1F; }
  .form-input { height:42px; padding:0 14px; border:1.5px solid rgba(0,0,0,.08); border-radius:10px; font-size:14px; color:rgba(0,0,0,.88); background:rgba(248,250,252,.5); font-family:inherit; outline:none; }
  .input-wrapper { position:relative; }
  .input-wrapper .form-input { width:100%; padding-right:44px; }
  .toggle-pwd { position:absolute; right:12px; top:50%; transform:translateY(-50%); width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:rgba(0,0,0,.26); background:none; border:none; }
  .toggle-pwd svg { width:18px; height:18px; }
  .password-strength { display:flex; gap:4px; margin-top:8px; align-items:center; }
  .strength-bar { width:40px; height:3px; border-radius:2px; background:rgba(0,0,0,.06); }
  .strength-bar.weak { background:#D31F1F; }
  .strength-bar.medium { background:#F59E0B; }
  .strength-bar.strong { background:#01B864; }
  .strength-text { font-size:11px; margin-left:8px; color:rgba(0,0,0,.26); }
  .security-tips { display:flex; gap:12px; padding:14px 18px; background:rgba(25,134,236,.04); border-radius:12px; border:1px solid rgba(25,134,236,.08); margin-top:20px; }
  .security-tips svg { width:18px; height:18px; color:#1986EC; flex-shrink:0; }
  .security-tips p { font-size:12px; color:rgba(0,0,0,.55); line-height:18px; }
  .btn { height:42px; padding:0 24px; border:none; border-radius:10px; font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; }
  .btn-primary { background:linear-gradient(135deg,#1986EC,#1472CC); color:#fff; box-shadow:0 4px 12px rgba(25,134,236,.25); }
  .btn-secondary { background:rgba(0,0,0,.03); color:rgba(0,0,0,.68); border:1.5px solid rgba(0,0,0,.08); }
  .form-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; padding-top:20px; border-top:1px solid rgba(0,0,0,.04); }
  .decoration-dots { position:absolute; right:32px; top:32px; width:64px; height:64px; opacity:.06; background-image:radial-gradient(circle,#1986EC 1.5px,transparent 1.5px); background-size:14px 14px; }
  /* ===== 右侧面板 ===== */
  .right-panel { display:flex; flex-direction:column; gap:20px; }
  .section-label { font-size:12px; font-weight:600; color:rgba(0,0,0,.44); text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px; }
  /* 安全评分 */
  .security-score-card { background:linear-gradient(135deg,#01B864 0%,#059669 100%); border-radius:16px; padding:28px; color:#fff; text-align:center; position:relative; overflow:hidden; }
  .security-score-card::before { content:''; position:absolute; left:-20px; top:-20px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,.06); }
  .security-score-card::after { content:''; position:absolute; right:-10px; bottom:-10px; width:60px; height:60px; border-radius:50%; background:rgba(255,255,255,.04); }
  .score-circle { width:120px; height:120px; border-radius:50%; border:4px solid rgba(255,255,255,.2); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 16px; position:relative; }
  .score-circle::before { content:''; position:absolute; top:-4px; left:-4px; right:-4px; bottom:-4px; border-radius:50%; border:4px solid transparent; border-top-color:rgba(255,255,255,.8); transform:rotate(45deg); }
  .score-value { font-size:36px; font-weight:700; }
  .score-label { font-size:11px; color:rgba(255,255,255,.7); }
  .score-desc { font-size:13px; color:rgba(255,255,255,.8); }
  /* 安全检查清单 */
  .check-item { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid rgba(0,0,0,.04); }
  .check-item:last-child { border-bottom:none; }
  .check-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .check-icon svg { width:14px; height:14px; }
  .check-icon.pass { background:rgba(1,184,100,.1); color:#01B864; }
  .check-icon.warn { background:rgba(245,158,11,.1); color:#F59E0B; }
  .check-icon.fail { background:rgba(211,31,31,.1); color:#D31F1F; }
  .check-text { font-size:13px; color:rgba(0,0,0,.68); flex:1; }
  .check-status { font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; }
  .check-status.pass { background:rgba(1,184,100,.08); color:#01B864; }
  .check-status.warn { background:rgba(245,158,11,.08); color:#F59E0B; }
  .check-status.fail { background:rgba(211,31,31,.08); color:#D31F1F; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="rgba(255,255,255,.9)"/><rect x="13" y="2" width="9" height="9" rx="2" fill="rgba(255,255,255,.6)"/><rect x="2" y="13" width="9" height="9" rx="2" fill="rgba(255,255,255,.6)"/><rect x="13" y="13" width="9" height="9" rx="2" fill="rgba(255,255,255,.3)"/></svg>IWOSCENE</div>
  <div class="sidebar-menu">
    <div class="menu-label">导航</div>
    <div class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>工作台</div>
    <div class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2.5"/><line x1="4" y1="12" x2="20" y2="12"/></svg>设备管理</div>
    <div class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>组织管理</div>
    <div class="menu-label">系统</div>
    <div class="menu-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>个人中心</div>
    <div class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>系统设置</div>
  </div>
</div>
<div class="header">
  <div class="header-breadcrumb">系统 / <span>个人中心</span></div>
  <div class="header-right">
    <div class="header-icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <div class="header-icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>
    <div class="header-avatar-wrap"><div class="header-avatar">管</div><span class="header-user-name">Admin</span></div>
  </div>
</div>
<div class="content-area">
  <div class="page-header"><div class="page-title">个人中心</div><div class="page-subtitle">管理您的账户信息和安全设置</div></div>
  <div class="tab-bar">
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 006 0v-1a10 10 0 10-4 8"/></svg>基本设置</div>
    <div class="tab-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>修改密码</div>
    <div class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>微信绑定</div>
  </div>

  <div class="main-grid">
    <!-- 左侧：修改密码 -->
    <div class="card" style="position:relative">
      <div class="decoration-dots"></div>
      <div class="card-header"><div class="card-title"><div class="icon-circle" style="background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(245,158,11,.05));color:#F59E0B"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>修改密码</div></div>
      <div class="card-desc">定期更换密码有助于保护您的账户安全</div>
      <div class="card-body">
        <div class="form-grid" style="grid-template-columns:1fr">
          <div class="form-group"><label class="form-label">当前密码 <span class="required">*</span></label><div class="input-wrapper"><input class="form-input" type="password" placeholder="请输入当前密码"/><button class="toggle-pwd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
          <div class="form-group"><label class="form-label">新密码 <span class="required">*</span></label><div class="input-wrapper"><input class="form-input" type="password" placeholder="至少8位，含大小写字母和数字"/><button class="toggle-pwd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div><div class="password-strength"><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div><span class="strength-text">输入密码后显示强度</span></div></div>
          <div class="form-group"><label class="form-label">确认新密码 <span class="required">*</span></label><div class="input-wrapper"><input class="form-input" type="password" placeholder="请再次输入新密码"/><button class="toggle-pwd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button></div></div>
        </div>
        <div class="security-tips"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg><p>密码修改成功后将自动退出登录，请使用新密码重新登录。建议密码长度不少于8位，包含大小写字母、数字和特殊字符。</p></div>
        <div class="form-actions"><button class="btn btn-secondary">取消</button><button class="btn btn-primary">确认修改</button></div>
      </div>
    </div>

    <!-- 右侧面板 -->
    <div class="right-panel">
      <!-- 安全评分 -->
      <div class="security-score-card">
        <div class="score-circle"><div class="score-value">85</div><div class="score-label">安全评分</div></div>
        <div class="score-desc">您的账户安全等级为「良好」，建议完善以下安全项</div>
      </div>
      <!-- 安全检查清单 -->
      <div class="card" style="padding:20px 24px; flex:1;">
        <div class="section-label">安全检查清单</div>
        <div class="check-item">
          <div class="check-icon pass"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
          <span class="check-text">密码强度达标</span>
          <span class="check-status pass">已通过</span>
        </div>
        <div class="check-item">
          <div class="check-icon pass"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
          <span class="check-text">90 天内已更换密码</span>
          <span class="check-status pass">已通过</span>
        </div>
        <div class="check-item">
          <div class="check-icon warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
          <span class="check-text">绑定微信扫码登录</span>
          <span class="check-status warn">待完善</span>
        </div>
        <div class="check-item">
          <div class="check-icon pass"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
          <span class="check-text">手机号已验证</span>
          <span class="check-status pass">已通过</span>
        </div>
        <div class="check-item">
          <div class="check-icon fail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
          <span class="check-text">开启两步验证</span>
          <span class="check-status fail">未开启</span>
        </div>
        <div class="check-item">
          <div class="check-icon pass"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
          <span class="check-text">邮箱已验证</span>
          <span class="check-status pass">已通过</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
